name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derivar version
        run: echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build & push (release.sh)
        working-directory: docker
        env:
          PBXNG_REGISTRY: ghcr.io/${{ github.repository_owner }}/pbx-ng
        run: bash release.sh --push --version="${VER:-latest}"
