<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
<rect width="760" height="430" fill="#ffffff"/>
<text x="24" y="30" font-size="17" font-weight="800" fill="#0f172a">Instalación en servidor físico (bare metal)</text>
<text x="24" y="49" font-size="11.5" fill="#64748b">Todo el hardware es para la central. La opción de máximo rendimiento.</text>
<line x1="24" y1="60" x2="736" y2="60" stroke="#e2e8f0" stroke-width="1.5"/>
<rect x="24" y="76" width="712" height="46" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.8"/><text x="38" y="97.0" font-size="13" font-weight="700" fill="#0f172a">Servidor físico</text><text x="38" y="114.0" font-size="10.5" fill="#475569">CPU, RAM y disco dedicados — sin capas intermedias</text><rect x="24" y="130" width="712" height="46" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/><text x="38" y="151.0" font-size="13" font-weight="700" fill="#0f172a">Debian 12 / Ubuntu 22.04</text><text x="38" y="168.0" font-size="10.5" fill="#475569">sistema operativo directo sobre el hardware</text><rect x="24" y="184" width="712" height="46" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.8"/><text x="38" y="205.0" font-size="13" font-weight="700" fill="#0f172a">Docker + docker compose</text><text x="38" y="222.0" font-size="10.5" fill="#475569">motor de contenedores</text><text x="24" y="252" font-size="11" font-weight="700" fill="#166534">MÓDULOS DE PBX-NG</text><rect x="24" y="260" width="187.20000000000002" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="117.60000000000001" y="275" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">core (Asterisk + BD + panel)</text><rect x="218.20000000000002" y="260" width="27.200000000000003" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="231.8" y="275" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">sbc</text><rect x="252.40000000000003" y="260" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="269.20000000000005" y="275" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">turn</text><rect x="293.00000000000006" y="260" width="20.8" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="303.40000000000003" y="275" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">ai</text><rect x="320.80000000000007" y="260" width="59.2" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="350.4000000000001" y="275" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">intercom</text>
<rect x="24" y="300" width="712" height="73" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/><text x="38" y="318" font-size="11" font-weight="800" fill="#92400e">AL INSTALAR, TENER EN CUENTA</text><text x="38" y="337" font-size="11" fill="#78350f">• Es el mejor rendimiento de audio: nada le roba CPU a la central.</text><text x="38" y="354" font-size="11" fill="#78350f">• Recomendado para centrales grandes, muchas llamadas simultáneas o grabación masiva.</text><text x="38" y="371" font-size="11" fill="#78350f">• Sincronizá el reloj (chrony/NTP): sin hora correcta fallan TLS y el cifrado del audio.</text>
</svg>
