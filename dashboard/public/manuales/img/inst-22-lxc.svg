<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
<rect width="760" height="430" fill="#ffffff"/>
<text x="24" y="30" font-size="17" font-weight="800" fill="#0f172a">Instalación en contenedor LXC (Proxmox)</text>
<text x="24" y="49" font-size="11.5" fill="#64748b">Más densidad y arranque rápido, a cambio de compartir el núcleo del host.</text>
<line x1="24" y1="60" x2="736" y2="60" stroke="#e2e8f0" stroke-width="1.5"/>
<rect x="24" y="76" width="712" height="38" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.8"/><text x="38" y="93.0" font-size="13" font-weight="700" fill="#0f172a">Servidor físico</text><rect x="24" y="122" width="712" height="38" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/><text x="38" y="139.0" font-size="13" font-weight="700" fill="#0f172a">Proxmox VE</text><text x="38" y="156.0" font-size="10.5" fill="#475569">el núcleo del host es COMPARTIDO por los contenedores</text><rect x="24" y="168" width="712" height="52" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.8"/><text x="38" y="192.0" font-size="13" font-weight="700" fill="#0f172a">Contenedor LXC</text><text x="38" y="209.0" font-size="10.5" fill="#475569">requiere Anidamiento (nesting) = SÍ  ·  keyctl = SÍ</text><rect x="24" y="228" width="712" height="36" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.8"/><text x="38" y="244.0" font-size="13" font-weight="700" fill="#0f172a">Docker + docker compose</text><text x="38" y="261.0" font-size="10.5" fill="#475569">corre DENTRO del LXC gracias al anidamiento</text><text x="24" y="288" font-size="11" font-weight="700" fill="#166534">MÓDULOS DE PBX-NG</text><rect x="24" y="296" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="40.8" y="311" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">core</text><rect x="64.6" y="296" width="27.200000000000003" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="78.19999999999999" y="311" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">sbc</text><rect x="98.8" y="296" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="115.6" y="311" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">turn</text><rect x="139.4" y="296" width="20.8" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="149.8" y="311" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">ai</text><rect x="167.20000000000002" y="296" width="59.2" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="196.8" y="311" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">intercom</text>
<rect x="24" y="332" width="712" height="73" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/><text x="38" y="350" font-size="11" font-weight="800" fill="#92400e">AL INSTALAR, TENER EN CUENTA</text><text x="38" y="369" font-size="11" fill="#78350f">• Sin «nesting» y «keyctl» activados, Docker NO arranca adentro y el error no es obvio.</text><text x="38" y="386" font-size="11" fill="#78350f">• Consume menos y arranca más rápido que una VM, pero comparte el núcleo del host.</text><text x="38" y="403" font-size="11" fill="#78350f">• Si dudás entre LXC y VM, elegí VM: es más predecible para el audio en tiempo real.</text>
</svg>
