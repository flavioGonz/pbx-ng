<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 330" width="900" height="330" font-family="Segoe UI,Inter,Arial,sans-serif">
  <style>.t{font-size:15px;font-weight:700;fill:#0f172a}.s{font-size:12px;fill:#64748b}.c{font-size:11px;font-weight:800;letter-spacing:.6px}</style>
  <rect width="900" height="330" fill="#f8fafc"/>

  <rect x="40" y="40" width="250" height="250" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <rect x="80" y="76" width="170" height="106" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="80" y="76" width="170" height="18" rx="8" fill="#bfdbfe"/>
  <rect x="105" y="182" width="120" height="8" rx="4" fill="#cbd5e1"/>
  <text x="165" y="222" text-anchor="middle" class="t">En el navegador</text>
  <text x="165" y="244" text-anchor="middle" class="s">No instalás nada.</text>
  <text x="165" y="262" text-anchor="middle" class="s">Entrás a la web y listo.</text>

  <rect x="325" y="40" width="250" height="250" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <rect x="415" y="70" width="70" height="120" rx="12" fill="#f0fdfa" stroke="#99f6e4"/>
  <rect x="424" y="82" width="52" height="90" rx="4" fill="#fff" stroke="#99f6e4"/>
  <circle cx="450" cy="182" r="4" fill="#0d9488"/>
  <text x="450" y="222" text-anchor="middle" class="t">En el celular</text>
  <text x="450" y="244" text-anchor="middle" class="s">Abrís el enlace del correo</text>
  <text x="450" y="262" text-anchor="middle" class="s">y lo agregás al inicio.</text>

  <rect x="610" y="40" width="250" height="250" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <rect x="660" y="76" width="150" height="96" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
  <rect x="660" y="76" width="150" height="14" rx="6" fill="#ddd6fe"/>
  <rect x="700" y="172" width="70" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="676" y="180" width="118" height="6" rx="3" fill="#cbd5e1"/>
  <text x="735" y="222" text-anchor="middle" class="t">App de escritorio</text>
  <text x="735" y="244" text-anchor="middle" class="s">Ventana flotante, atajos y</text>
  <text x="735" y="262" text-anchor="middle" class="s">timbre aunque esté minimizada.</text>
</svg>
