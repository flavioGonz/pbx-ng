<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
<rect width="760" height="430" fill="#ffffff"/>
<text x="24" y="30" font-size="17" font-weight="800" fill="#0f172a">Instalación en un VPS (nube)</text>
<text x="24" y="49" font-size="11.5" fill="#64748b">Central sin sede física. Todo depende de que el proveedor deje pasar el audio.</text>
<line x1="24" y1="60" x2="736" y2="60" stroke="#e2e8f0" stroke-width="1.5"/>
<rect x="24" y="76" width="712" height="38" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.8"/><text x="38" y="93.0" font-size="13" font-weight="700" fill="#0f172a">Infraestructura del proveedor</text><text x="38" y="110.0" font-size="10.5" fill="#475569">no la controlás vos</text><rect x="24" y="122" width="712" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/><text x="38" y="142.0" font-size="13" font-weight="700" fill="#0f172a">VPS (Debian / Ubuntu)</text><text x="38" y="159.0" font-size="10.5" fill="#475569">IP pública propia · verificá que NO bloqueen UDP</text><rect x="24" y="174" width="712" height="36" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.8"/><text x="38" y="190.0" font-size="13" font-weight="700" fill="#0f172a">Docker + docker compose</text><text x="24" y="232" font-size="11" font-weight="700" fill="#166534">MÓDULOS DE PBX-NG</text><rect x="24" y="240" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="40.8" y="255" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">core</text><rect x="64.6" y="240" width="27.200000000000003" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="78.19999999999999" y="255" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">sbc</text><rect x="98.8" y="240" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="115.6" y="255" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">turn</text><rect x="139.4" y="240" width="20.8" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="149.8" y="255" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">ai</text><rect x="167.20000000000002" y="240" width="59.2" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="196.8" y="255" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">intercom</text><rect x="24" y="276" width="712" height="40" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/><text x="38" y="294.0" font-size="13" font-weight="700" fill="#0f172a">Red del proveedor</text><text x="38" y="311.0" font-size="10.5" fill="#475569">si la IP pública NO está en la interfaz, hay que declarar PUBLIC_IP</text>
<rect x="24" y="330" width="712" height="73" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/><text x="38" y="348" font-size="11" font-weight="800" fill="#92400e">AL INSTALAR, TENER EN CUENTA</text><text x="38" y="367" font-size="11" fill="#78350f">• Muchos proveedores filtran UDP: sin UDP no hay audio, aunque la llamada conecte.</text><text x="38" y="384" font-size="11" fill="#78350f">• Si la IP pública no está en la placa (NAT del proveedor), configurá PUBLIC_IP al instalar.</text><text x="38" y="401" font-size="11" fill="#78350f">• Abrí el rango RTP y el relay del TURN, no sólo el 5060: es el error número uno.</text>
</svg>
