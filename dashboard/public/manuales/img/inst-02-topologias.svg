<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" width="900" height="430" font-family="Segoe UI,Inter,Arial,sans-serif">
  <defs><marker id="b" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/></marker>
  <style>.t{font-size:13px;font-weight:700;fill:#0f172a}.s{font-size:11px;fill:#64748b}
  .h{font-size:14px;font-weight:800;fill:#0f172a}.tag{font-size:10px;font-weight:800;letter-spacing:.7px}
  .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;marker-end:url(#b)}</style></defs>
  <rect width="900" height="430" fill="#f8fafc"/>

  <!-- opcion A -->
  <text x="40" y="38" class="h">A · Una sola máquina</text>
  <text x="40" y="58" class="s">Todo en un servidor. Ideal para una central única, una oficina o una prueba.</text>
  <rect x="40" y="76" width="370" height="300" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="100" class="tag" fill="#94a3b8">SERVIDOR ÚNICO</text>
  <rect x="60" y="112" width="330" height="52" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="225" y="143" text-anchor="middle" class="t">proxy · TLS</text>
  <rect x="60" y="176" width="158" height="52" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="139" y="207" text-anchor="middle" class="t">SBC</text>
  <rect x="232" y="176" width="158" height="52" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="311" y="207" text-anchor="middle" class="t">TURN</text>
  <rect x="60" y="240" width="330" height="120" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="225" y="272" text-anchor="middle" class="t">Núcleo: Asterisk · API · Panel · Base de datos</text>
  <text x="225" y="296" text-anchor="middle" class="s">Todos los módulos comparten el mismo host</text>
  <text x="225" y="330" text-anchor="middle" class="s">./install.sh --role=all</text>

  <!-- opcion B -->
  <text x="490" y="38" class="h">B · Núcleo + borde (dos máquinas)</text>
  <text x="490" y="58" class="s">El borde queda expuesto; el núcleo, protegido en la LAN.</text>

  <rect x="490" y="76" width="370" height="130" rx="14" fill="#fff" stroke="#fecaca"/>
  <text x="510" y="100" class="tag" fill="#dc2626">DMZ · EXPUESTO A INTERNET</text>
  <rect x="510" y="112" width="158" height="72" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="589" y="142" text-anchor="middle" class="t">SBC</text>
  <text x="589" y="162" text-anchor="middle" class="s">SIP · medios</text>
  <rect x="682" y="112" width="158" height="72" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="761" y="142" text-anchor="middle" class="t">TURN</text>
  <text x="761" y="162" text-anchor="middle" class="s">NAT WebRTC</text>

  <rect x="490" y="246" width="370" height="130" rx="14" fill="#fff" stroke="#bbf7d0"/>
  <text x="510" y="270" class="tag" fill="#16a34a">LAN · SIN PUERTOS AL WAN</text>
  <rect x="510" y="282" width="330" height="76" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="675" y="312" text-anchor="middle" class="t">Núcleo: Asterisk · API · Panel · Base de datos</text>
  <text x="675" y="336" text-anchor="middle" class="s">Grabaciones y datos fuera del alcance de Internet</text>

  <path class="ln" d="M675,190 L675,242"/>
  <text x="690" y="224" class="s">Postgres · AMI · ARI</text>
</svg>
