<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520" font-family="Segoe UI,Inter,Arial,sans-serif">
<title>Antes de empezar: lo que hay que tener sobre la mesa</title>
<defs><filter id="sh" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".10"/></filter>
<style>.t{font-size:15px;font-weight:700;fill:#0f172a}.s{font-size:11.5px;fill:#64748b}.h{font-size:11px;font-weight:800;letter-spacing:1.3px;fill:#94a3b8}</style></defs>
<rect width="980" height="520" fill="#f6f8fb"/>
<text x="40" y="46" class="h">ANTES DE ENCHUFAR NADA</text>
<text x="40" y="76" font-size="24" font-weight="800" fill="#0f172a">Seis cosas que conviene tener resueltas</text>
<text x="40" y="100" class="s">Ninguna es difícil, pero si falta una, la puesta en marcha se frena a la mitad y hay que esperar a un tercero.</text>
<g filter="url(#sh)"><rect x="40" y="124" width="296" height="178" rx="13" fill="#eff6ff" stroke="#bfdbfe"/></g>
<g transform="translate(60,144)" stroke="#2f80ff" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M2 12h20M12 2c2.6 2.7 4 6.3 4 10s-1.4 7.3-4 10c-2.6-2.7-4-6.3-4-10s1.4-7.3 4-10z"/></g>
<circle cx="310" cy="154" r="13" fill="#2f80ff" opacity=".14"/>
<text x="310" y="159" text-anchor="middle" font-size="12" font-weight="800" fill="#2f80ff">1</text>
<text x="60" y="192" class="t">Un dominio</text>
<text x="60" y="216" class="s">pbx.tuempresa.com apuntando a tu IP.</text>
<text x="60" y="234" class="s">Sin dominio no hay certificado,</text>
<text x="60" y="252" class="s">y sin certificado no hay softphone web.</text>
<g filter="url(#sh)"><rect x="356" y="124" width="296" height="178" rx="13" fill="#f0fdfa" stroke="#99f6e4"/></g>
<g transform="translate(376,144)" stroke="#0d9488" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="7" rx="2"/><rect x="2" y="14" width="20" height="7" rx="2"/><path d="M6 7.5h.01M6 17.5h.01"/></g>
<circle cx="626" cy="154" r="13" fill="#0d9488" opacity=".14"/>
<text x="626" y="159" text-anchor="middle" font-size="12" font-weight="800" fill="#0d9488">2</text>
<text x="376" y="192" class="t">IP pública</text>
<text x="376" y="216" class="s">Fija, o dinámica con DDNS.</text>
<text x="376" y="234" class="s">Si cambia, el sistema la vuelve</text>
<text x="376" y="252" class="s">a resolver solo.</text>
<g filter="url(#sh)"><rect x="672" y="124" width="296" height="178" rx="13" fill="#fef2f2" stroke="#fecaca"/></g>
<g transform="translate(692,144)" stroke="#e05252" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="18" height="12" rx="2.5"/><path d="M7 10V7a5 5 0 0 1 10 0"/></g>
<circle cx="942" cy="154" r="13" fill="#e05252" opacity=".14"/>
<text x="942" y="159" text-anchor="middle" font-size="12" font-weight="800" fill="#e05252">3</text>
<text x="692" y="192" class="t">Puertos abiertos</text>
<text x="692" y="216" class="s">443, 5060/5061, RTP y TURN.</text>
<text x="692" y="234" class="s">Con NAT hairpin si vas a llamar</text>
<text x="692" y="252" class="s">desde adentro de la misma red.</text>
<g filter="url(#sh)"><rect x="40" y="322" width="296" height="178" rx="13" fill="#fffbeb" stroke="#fde68a"/></g>
<g transform="translate(60,342)" stroke="#d97706" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 3h4l2 5-2.5 1.5a12 12 0 0 0 5.5 5.5L16 12.5l5 2v4a2 2 0 0 1-2.2 2A16.5 16.5 0 0 1 3.5 5.2 2 2 0 0 1 5.5 3z"/></g>
<circle cx="310" cy="352" r="13" fill="#d97706" opacity=".14"/>
<text x="310" y="357" text-anchor="middle" font-size="12" font-weight="800" fill="#d97706">4</text>
<text x="60" y="390" class="t">Datos del operador</text>
<text x="60" y="414" class="s">Host, usuario, contraseña y los</text>
<text x="60" y="432" class="s">números (DID) que te asignaron.</text>
<text x="60" y="450" class="s">Pedilos antes: siempre demoran.</text>
<g filter="url(#sh)"><rect x="356" y="322" width="296" height="178" rx="13" fill="#faf5ff" stroke="#e9d5ff"/></g>
<g transform="translate(376,342)" stroke="#7c3aed" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2.5"/><path d="M2.5 6.5 12 13l9.5-6.5"/></g>
<circle cx="626" cy="352" r="13" fill="#7c3aed" opacity=".14"/>
<text x="626" y="357" text-anchor="middle" font-size="12" font-weight="800" fill="#7c3aed">5</text>
<text x="376" y="390" class="t">Una casilla de correo</text>
<text x="376" y="414" class="s">Servidor SMTP con usuario y clave.</text>
<text x="376" y="432" class="s">Sin correo no hay QR, ni buzón</text>
<text x="376" y="450" class="s">por mail, ni alertas.</text>
<g filter="url(#sh)"><rect x="672" y="322" width="296" height="178" rx="13" fill="#ecfdf5" stroke="#a7f3d0"/></g>
<g transform="translate(692,342)" stroke="#059669" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20h5v-2a3 3 0 0 0-4-2.8M9 20H2v-2a5 5 0 0 1 7-4.6M16 3.5a3 3 0 0 1 0 5.7M12.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></g>
<circle cx="942" cy="352" r="13" fill="#059669" opacity=".14"/>
<text x="942" y="357" text-anchor="middle" font-size="12" font-weight="800" fill="#059669">6</text>
<text x="692" y="390" class="t">El plan de internos</text>
<text x="692" y="414" class="s">Quién es quién y qué número le toca.</text>
<text x="692" y="432" class="s">Un Excel de dos columnas alcanza,</text>
<text x="692" y="450" class="s">pero tenelo antes de empezar.</text>
</svg>