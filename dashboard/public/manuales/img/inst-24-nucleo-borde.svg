<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
<rect width="760" height="430" fill="#ffffff"/>
<text x="24" y="30" font-size="17" font-weight="800" fill="#0f172a">Instalación en dos máquinas: núcleo + borde</text>
<text x="24" y="49" font-size="11.5" fill="#64748b">El núcleo queda protegido en la LAN y sólo el borde se expone a internet.</text>
<line x1="24" y1="60" x2="736" y2="60" stroke="#e2e8f0" stroke-width="1.5"/>
<rect x="24" y="80" width="330" height="180" rx="12" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/><text x="40" y="104" font-size="13" font-weight="800" fill="#1e40af">NÚCLEO (en la LAN)</text><text x="40" y="122" font-size="10.5" fill="#475569">no se publica a internet</text><rect x="40" y="136" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="56.8" y="151" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">core</text><rect x="40" y="166" width="59.2" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="69.6" y="181" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">Asterisk</text><rect x="106.2" y="166" width="20.8" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="116.60000000000001" y="181" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">BD</text><rect x="134.0" y="166" width="40.0" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="154.0" y="181" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">panel</text><text x="40" y="214" font-size="10.5" fill="#475569">Guarda las grabaciones,</text><text x="40" y="230" font-size="10.5" fill="#475569">los usuarios y el CDR.</text><rect x="406" y="80" width="330" height="180" rx="12" fill="#f8fafc" stroke="#d97706" stroke-width="2"/><text x="422" y="104" font-size="13" font-weight="800" fill="#92400e">BORDE (en la DMZ)</text><text x="422" y="122" font-size="10.5" fill="#475569">expuesto a internet</text><rect x="422" y="136" width="27.200000000000003" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="435.6" y="151" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">sbc</text><rect x="456.2" y="136" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="473.0" y="151" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">turn</text><text x="422" y="190" font-size="10.5" fill="#475569">Recibe los ataques, las</text><text x="422" y="206" font-size="10.5" fill="#475569">troncales y los teléfonos</text><text x="422" y="222" font-size="10.5" fill="#475569">remotos.</text><line x1="354" y1="170" x2="406" y2="170" stroke="#64748b" stroke-width="2.5" stroke-dasharray="5 4"/><text x="380" y="162" font-size="9.5" text-anchor="middle" fill="#475569">LAN</text><circle cx="736" cy="40" r="0" fill="none"/><text x="24" y="290" font-size="11" fill="#334155">El instalador del núcleo genera un archivo de unión (<tspan font-family="monospace" font-size="10.5">edge-join.env</tspan>) con los secretos compartidos; se copia al borde y se instala con <tspan font-family="monospace" font-size="10.5">--join</tspan>.</text>
<rect x="24" y="310" width="712" height="73" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/><text x="38" y="328" font-size="11" font-weight="800" fill="#92400e">AL INSTALAR, TENER EN CUENTA</text><text x="38" y="347" font-size="11" fill="#78350f">• Se usa cuando la seguridad perimetral importa: si vulneran el borde, no llegan a la base ni a las grabaciones.</text><text x="38" y="364" font-size="11" fill="#78350f">• El borde verifica que alcanza al núcleo ANTES de desplegar: si un puerto no responde, avisa.</text><text x="38" y="381" font-size="11" fill="#78350f">• Para una oficina o una central única, con UNA sola máquina alcanza y sobra.</text>
</svg>
