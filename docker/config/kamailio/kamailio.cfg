#!KAMAILIO
# PBX-NG SBC de borde (señalización) - Kamailio delante de Asterisk @@ASTERISK_IP@@
debug=2
log_stderror=no
memdbg=5
memlog=5
fork=yes
children=4
auto_aliases=no
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060   # SIP/TCP (telefonos moviles/CGNAT, conexion persistente)
listen=tcp:0.0.0.0:8077
listen=tcp:0.0.0.0:8088   # WebSocket SIP (WebRTC); NPM termina TLS y reenvia ws
tcp_accept_no_cl=yes   # aceptar GET de handshake WS sin Content-Length
tcp_connection_lifetime=3604
# --- ocultar identidad del borde (no revelar Kamailio) ---
server_header="Server: PBX-NG SBC"
user_agent_header="User-Agent: PBX-NG SBC"
server_signature=no

loadmodule "jsonrpcs.so"
loadmodule "xhttp.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "dispatcher.so"
loadmodule "nathelper.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "rtpengine.so"
loadmodule "websocket.so"
loadmodule "db_postgres.so"
loadmodule "uac.so"
loadmodule "drouting.so"
loadmodule "dialog.so"
loadmodule "sst.so"
loadmodule "acc.so"
loadmodule "secfilter.so"

modparam("tm", "failure_reply_mode", 3)
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 30)
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_probing_mode", 3)
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=403;code=404;code=405;code=480;code=486")
modparam("nathelper", "natping_interval", 0)
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 40)
modparam("pike", "remove_latency", 4)
modparam("htable", "htable", "ipban=>size=8;autoexpire=1800;")
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")
modparam("nathelper", "received_avp", "$avp(received)")
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)
# --- uac: registra el SBC contra los proveedores (troncales en el borde) ---
modparam("uac", "reg_db_url", "@@DB_URL@@")
modparam("uac", "reg_contact_addr", "@@SELF_IP@@:5060")
modparam("uac", "reg_timer_interval", 90)
modparam("uac", "reg_retry_interval", 60)
modparam("uac", "reg_keep_callid", 1)
modparam("uac", "reg_random_delay", 5)
modparam("uac", "restore_mode", "none")
# --- LCR / enrutamiento por operador (drouting) ---
modparam("drouting", "db_url", "@@DB_URL@@")
modparam("drouting", "use_domain", 0)
modparam("drouting", "drd_table", "dr_gateways")
modparam("drouting", "drr_table", "dr_rules")
modparam("drouting", "drg_table", "dr_groups")
modparam("drouting", "drl_table", "dr_gw_lists")

# --- dialog: seguimiento de llamadas, conteo real y anti-zombi (timeout server-side) ---
modparam("dialog", "enable_stats", 1)
modparam("dialog", "dlg_flag", 4)
modparam("dialog", "default_timeout", 7200)
modparam("dialog", "db_mode", 0)
modparam("dialog", "track_cseq_updates", 1)
# --- Session Timers (RFC 4028) anti-zombi: limpia llamadas colgadas ---
modparam("sst", "min_se", 90)
modparam("sst", "reject_to_small", 0)
modparam("sst", "enable_stats", 1)
modparam("sst", "sst_flag", 5)
# --- acc: CDR del SBC a syslog ---
modparam("acc", "early_media", 0)
modparam("acc", "report_cancels", 1)
modparam("acc", "log_flag", 6)
modparam("acc", "log_extra", "src=$fU;dst=$rU;srcip=$si")
# --- secfilter: listas de bloqueo gestionables (UA/IP/dst) desde DB ---
modparam("secfilter", "db_url", "@@DB_URL@@")
modparam("secfilter", "table_name", "secfilter")


#=== PBXNG-MODS START ===
#=== PBXNG-MODS END ===

request_route {
    # --- anti-loop: el SBC nunca origina pedidos nuevos hacia si mismo (corta bucles de scanner/fraude) ---
    if (src_ip == @@SELF_IP@@ && !has_totag()) {
        xlog("L_NOTICE","SBC anti-loop drop $rm ru=$ru si=$si\n");
        exit;
    }
    # --- anti-flood perimetral ---
    # LAN interna confiable (gateway/NAT) exenta del anti-flood; escaneres externos llegan con IP real
    if (src_ip != myself && src_ip != @@TRUSTED_NET@@) {
        if ($sht(ipban=>$si) != $null) { xdbg("PIKE banned $si\n"); exit; }
        if (!pike_check_req()) { xlog("L_ALERT","PIKE flood $si -> ban\n"); $sht(ipban=>$si) = 1; exit; }
    }
    if (!mf_process_maxfwd_header("10")) { sl_send_reply("483", "Too Many Hops"); exit; }
    if (!sanity_check("1511", "7")) { xlog("malformed msg from $si:$sp\n"); exit; }
    # --- scanner PSTN/fraude desde afuera (no-LAN): destinos tipo PSTN sin ser interno -> drop+ban ---
    if (is_method("INVITE") && !has_totag() && src_ip != myself && src_ip != @@TRUSTED_NET@@ && ($rU =~ "^[0-9]{7,}$" || $rU =~ "^[+]" || $rU =~ "^00")) {
        xlog("L_NOTICE","SBC drop ext-PSTN-scan num=$rU si=$si\n");
        $sht(ipban=>$si) = 1;
        sl_send_reply("404", "Not Found");
        exit;
    }
    if (is_method("INVITE") && !has_totag() && $rU =~ "^[0-9]{14,}$") {
        xlog("L_NOTICE","SBC drop toll-fraud num=$rU si=$si\n");
        if (src_ip != myself && src_ip != @@TRUSTED_NET@@) { $sht(ipban=>$si) = 1; xlog("L_WARN","SBC BAN $si 30m\n"); }
        sl_send_reply("404", "Not Found");
        exit;
    }

    # --- secfilter: IP en lista negra (gestionable) ---
    if (src_ip != myself && src_ip != @@TRUSTED_NET@@ && !secf_check_ip()) { xlog("L_NOTICE","SBC secfilter IP bloqueada si=$si\n"); sl_send_reply("403", "Forbidden"); exit; }

    # --- drop de escaneres / fraude SIP (PBX-NG hardening) ---
    if (!secf_check_ua()) {
        xlog("L_NOTICE","SBC secfilter UA bloqueado si=$si ua=$ua\n");
        if (src_ip != myself && src_ip != @@TRUSTED_NET@@) { $sht(ipban=>$si) = 1; xlog("L_WARN","SBC BAN $si 30m\n"); }
        sl_send_reply("403", "Forbidden");
        exit;
    }
    if ($fU =~ "[';\"]" || $rU =~ "[';\"]") {
        xlog("L_NOTICE","SBC drop sip-injection si=$si fU=$fU rU=$rU\n");
        if (src_ip != myself && src_ip != @@TRUSTED_NET@@) { $sht(ipban=>$si) = 1; xlog("L_WARN","SBC BAN $si 30m\n"); }
        sl_send_reply("403", "Forbidden");
        exit;
    }

#=== PBXNG-ROUTE START ===
#=== PBXNG-ROUTE END ===
    # --- in-dialog ---
    if (has_totag()) {
        if (loose_route()) {
            handle_ruri_alias();
            if (uri == myself) {
                if (is_method("ACK")) { xlog("L_WARN","SBC drop ACK self-loop (lr)\n"); exit; }
                if (is_method("BYE")) rtpengine_delete();
                if (!ds_select_dst("1", "4")) { sl_send_reply("404", "Not Found"); exit; }
                route(RELAY); exit;
            }
            if (is_method("INVITE")) rtpengine_manage("replace-origin replace-session-connection");
            if (is_method("BYE")) rtpengine_delete();
            route(RELAY);
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) { route(RELAY); }
                else { handle_ruri_alias(); if (uri==myself) { xlog("L_WARN","SBC drop ACK self-loop ru=$ru\n"); exit; } route(RELAY); }
                exit;
            }
            # in-dialog sin Route (UA no respeta Record-Route, ej. UVP viejo): rutear igual en vez de 404
            if (is_method("BYE")) rtpengine_delete();
            if (!handle_ruri_alias()) { if (!ds_select_dst("1", "4")) { sl_send_reply("404", "Not Found"); exit; } }
            route(RELAY);
        }
        exit;
    }

    # --- destino = UA NATeado registrado (R-URI con alias) -> ruteo directo al telefono ---
    # OJO: REGISTER nunca pasa por alias (su R-URI es el registrar = SBC) -> iria a self-loop
    # --- control de sesion: dialog + accounting en INVITE inicial ---
    if (is_method("INVITE") && !has_totag()) { setflag(4); setflag(5); setflag(6); dlg_manage(); }

    # --- SALIENTE PSTN: INVITE inicial DESDE Asterisk -> operador con failover ---
    if (is_method("INVITE") && !has_totag() && src_ip == @@ASTERISK_IP@@ && !($ru =~ "alias=")) {
        if (do_routing("0")) {
            xlog("L_INFO","SBC LCR num=$rU -> ru=$ru du=$du\n");
            t_on_failure("OUTBOUND_FAILOVER");
            route(TOPOHIDE); route(SIPMANIP);
            record_route_advertised_address("@@PUBLIC_IP@@");
            rtpengine_manage("trust-address replace-origin replace-session-connection");
            route(RELAY);
            exit;
        } else {
            xlog("L_WARN","SBC LCR sin operador num=$rU\n");
            sl_send_reply("404", "No route to PSTN");
            exit;
        }
    }

    if (!is_method("REGISTER") && $ru =~ "alias=") {
        $var(webrtc) = 0;
        if ($ru =~ "~5([^0-9]|$)" || $ru =~ "~6([^0-9]|$)") $var(webrtc) = 1;
        if (handle_ruri_alias()) {
            xlog("L_INFO","SBC alias -> $ru (webrtc=$var(webrtc))\n");
            if (is_method("INVITE")) {
                record_route();
                if ($var(webrtc) == 1) rtpengine_manage("trust-address replace-origin replace-session-connection ICE=force RTP/SAVPF");
                else rtpengine_manage("trust-address replace-origin replace-session-connection");
            }
            route(RELAY);
            exit;
        }
    }

    if (is_method("CANCEL")) { if (t_check_trans()) route(RELAY); exit; }
    t_check_trans();

    remove_hf("Route");
    if (is_method("INVITE|SUBSCRIBE")) record_route();

    # --- NAT (señalización) ---
    force_rport();
    if (nat_uac_test("19") || proto == WS || proto == WSS || (is_method("REGISTER") && src_ip != myself && src_ip != @@TRUSTED_NET@@)) {
        set_contact_alias();
    }

    # --- relay de medios (rtpengine) en INVITE inicial ---
    if (is_method("INVITE") && !has_totag()) { if (proto == WS || proto == WSS) rtpengine_manage("trust-address replace-origin replace-session-connection ICE=remove RTP/AVP"); else rtpengine_manage("trust-address replace-origin replace-session-connection"); }

    # --- enviar a Asterisk (dispatcher set 1) ---
    if (!ds_select_dst("1", "4")) { send_reply("503", "No backend"); exit; }
    xlog("L_INFO","SBC $rm de $fU@$si -> $du\n");
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) sl_reply_error();
    exit;
}

onreply_route {
    if (nat_uac_test("1")) set_contact_alias();
    if (has_body("application/sdp")) rtpengine_manage("replace-origin replace-session-connection");
}

event_route[xhttp:request] {
    if ($hu =~ "^/RPC") { jsonrpc_dispatch(); exit; }
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade" && $rm == "GET") {
        if (ws_handle_handshake()) exit;
    }
    xhttp_reply("404", "Not Found", "text/plain", "no");
}

failure_route[OUTBOUND_FAILOVER] {
    if (t_is_canceled()) exit;
    if (t_check_status("486|408|5[0-9][0-9]")) {
        if (use_next_gw()) {
            xlog("L_INFO","SBC LCR failover -> ru=$ru du=$du\n");
            t_on_failure("OUTBOUND_FAILOVER");
            route(TOPOHIDE); route(SIPMANIP);
            rtpengine_manage("trust-address replace-origin replace-session-connection");
            route(RELAY);
            exit;
        }
        xlog("L_WARN","SBC LCR failover agotado\n");
    }
}

route[TOPOHIDE] {
    # --- Etapa 4: manipulacion SIP saliente a operadores ---
    # anunciar IP publica (en vez de 0.0.0.0/IP interna) para que el operador pueda responder/ACK/BYE
    set_advertised_address("@@PUBLIC_IP@@");
    # ocultar topologia/identidad interna
    remove_hf("User-Agent");
    append_hf("User-Agent: PBX-NG SBC\r\n");
    remove_hf("X-AST-Orig-Host");
    remove_hf("P-hint");
}

#=== PBXNG-SIPMANIP START ===
route[SIPMANIP] {
    return;
}
#=== PBXNG-SIPMANIP END ===
