;== PBX-NG res_parking.conf ==
;
; Aparcado de llamadas ("te la dejo en la 701"). El lote real lo GENERA el panel en
; pbxng.d/parking.conf, así se pueden cambiar el número de aparcado, el rango de plazas
; y el tiempo de espera sin reconstruir la imagen.
;
; Si el panel todavía no generó nada, queda el lote por defecto de abajo, que ya sirve:
;   - marcar/transferir a 700  -> aparca la llamada y dice en qué plaza quedó
;   - marcar 701..720          -> la recupera
;   - si nadie la recupera en 5 min, vuelve a timbrar donde estaba

[general]
parkeddynamic = no

[default]
parkext = 700
parkpos = 701-720
context = parkedcalls
parkingtime = 300
comebacktoorigin = yes
comebackdialtime = 30
parkedplay = caller
parkedcalltransfers = caller
parkedcallreparking = caller
findslot = first
parkinghints = yes

; Lo que genera el panel (si existe, sus valores mandan sobre el lote de arriba).
#include "pbxng.d/parking.conf"
