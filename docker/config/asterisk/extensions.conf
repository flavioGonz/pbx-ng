;==============================================================
; PBX-NG extensions.conf  (hibrido estatico + realtime)
;==============================================================
[general]
static=yes
writeprotect=no

[ivr]
switch => Realtime

[from-trunk]
include => ivr
; Las rutas entrantes (DID) se generan en realtime desde el panel.
switch => Realtime
exten => i,1,NoOp(DID sin ruta entrante)
 same => n,Hangup()
exten => s,1,Goto(from-trunk,i,1)

[internal]
include => ivr
; El contexto de las llamadas aparcadas: sin esto, recuperar una llamada desde un
; interno no funciona (las plazas viven en su propio contexto).
include => parkedcalls

; --- Captura de llamada (pickup) ---
; *8        -> atiende el telefono que esta sonando en TU grupo de captura
; **<int>   -> atiende el de ESE interno en concreto (captura dirigida)
exten => *8,1,NoOp(Captura de grupo)
 same => n,PickupChan(PJSIP/${EXTEN})
 same => n,Pickup()
 same => n,Hangup()
exten => _**.,1,NoOp(Captura dirigida a ${EXTEN:2})
 same => n,PickupChan(PJSIP/${EXTEN:2})
 same => n,Hangup()

; --- Aparcado de llamadas ---
; Transferi la llamada a 700 y Asterisk te dice en que plaza quedo (701, 702...).
; Para recuperarla, marca esa plaza desde cualquier interno.
; El lote (numero, rango y tiempo) se configura desde el panel: res_parking.conf
; incluye pbxng.d/parking.conf, que genera el panel.
exten => 700,1,NoOp(Aparcar llamada)
 same => n,Park()
 same => n,Hangup()

; --- Codigos de funcion (estaticos, audio en espanol) ---
exten => *43,1,NoOp(Prueba de eco)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Playback(demo-echodone)
 same => n,Hangup()
exten => *44,1,NoOp(Prueba de audio en espanol)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-congrats)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()
exten => *65,1,NoOp(Decir mi numero)
 same => n,Answer()
 same => n,Wait(1)
 same => n,SayDigits(${CALLERID(num)})
 same => n,Hangup()
exten => *97,1,NoOp(Mi buzon de voz)
 same => n,Answer()
 same => n,Wait(1)
 same => n,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()
exten => *98,1,NoOp(Buzon de otro)
 same => n,Answer()
 same => n,Wait(1)
 same => n,VoiceMailMain(@default)
 same => n,Hangup()
exten => 600,1,Goto(*43,1)
exten => 601,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-congrats)
 same => n,Hangup()
; --- Internos 1XXX / 9XXX con fallback a buzon ---
exten => _[1-9]XXX,1,NoOp(Llamando interno ${EXTEN})
 same => n,GotoIf($[${DIALPLAN_EXISTS(ivr,${EXTEN},1)}]?ivr,${EXTEN},1)
 same => n,Set(DIALEDEXT=${EXTEN})
 same => n,Set(CONTACTS=${PJSIP_DIAL_CONTACTS(${EXTEN})})
 same => n,GotoIf($["${CONTACTS}x" = "x"]?wake:dial)
 same => n(wake),Set(WAKE=${CURL(http://@@API_URL@@/api/internal/wake?ext=${EXTEN}&from=${CALLERID(num)})})
 same => n,Set(TRIES=0)
 same => n(poll),Set(CONTACTS=${PJSIP_DIAL_CONTACTS(${EXTEN})})
 same => n,GotoIf($["${CONTACTS}x" != "x"]?dial)
 same => n,Set(TRIES=$[${TRIES} + 1])
 same => n,GotoIf($[${TRIES} > 16]?dial)
 same => n,Wait(0.5)
 same => n,Goto(poll)
 same => n(dial),Set(DOREC=0)
 same => n,ExecIf($["${DB(rec/${EXTEN})}"="1"]?Set(DOREC=1))
 same => n,ExecIf($["${DB(rec/${CALLERID(num)})}"="1"]?Set(DOREC=1))
 same => n,ExecIf($["${DB(rec/_ALL_)}"="1"]?Set(DOREC=1))
 same => n,ExecIf($["${DOREC}"="1"]?MixMonitor(pbxng-${EXTEN}-${EPOCH}.wav,b))
 same => n,Dial(PJSIP/${EXTEN},25)
 same => n,Goto(vm-${DIALSTATUS},1)
exten => vm-NOANSWER,1,VoiceMail(${DIALEDEXT}@default,u)
 same => n,Hangup()
exten => vm-BUSY,1,VoiceMail(${DIALEDEXT}@default,b)
 same => n,Hangup()
exten => _vm-.,1,Hangup()
; reglas dinamicas (colas, conferencias, ring groups, salida troncal) en realtime
switch => Realtime

[c2c]
; Click-to-Call publico (invitados WebRTC efimeros) - rutas en realtime
switch => Realtime
exten => i,1,Hangup()
