# PBX-NG · stack Docker completo. Perfiles (profiles) para instalar separado o junto:
#   core  -> postgres, redis, asterisk, api, dashboard
#   sbc   -> kamailio, rtpengine
#   media -> coturn
#   ai    -> voz (TTS/STT)
#   proxy -> nginx-proxy-manager
# Uso:  docker compose --profile core --profile sbc up -d --build   (o usar install.sh)
#
# NOTA: asterisk/kamailio/coturn usan network_mode: host (SIP/RTP necesitan la red
# real). Para que alcancen a Postgres, éste publica 5432 en el host; por eso
# DB_HOST para esos servicios es la IP del host (o 127.0.0.1 en single-node).
name: pbxng

networks:
  pbxng:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  npm_data:
  npm_letsencrypt:
  asterisk_sounds:
  asterisk_conf:
  voz_models:
  recordings:
  voicemail:
  certs:
  # Los archivos de respaldo. Volumen propio: no se mezclan con las grabaciones
  # ni viven en el disco del contenedor (se perderian al recrearlo).
  respaldos:

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["core"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pbxng}
      POSTGRES_USER: ${DB_USER:-pbxng}
      POSTGRES_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./config/initdb:/docker-entrypoint-initdb.d:ro   # esquema realtime + app (primer arranque)
    ports: ["5432:5432"]                                  # host-net asterisk/kamailio alcanzan la DB
    networks: [pbxng]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pbxng}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["core"]
    restart: unless-stopped
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    networks: [pbxng]

  asterisk:
    build:
      context: .
      dockerfile: images/asterisk/Dockerfile
    image: pbxng/asterisk:22
    profiles: ["core"]
    restart: unless-stopped
    network_mode: host                 # SIP/RTP necesitan red del host
    cap_add:
      - NET_ADMIN                     # cambiar IP / activar-desactivar placas desde el panel
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-pbxng}
      DB_USER: ${DB_USER:-pbxng}
      DB_PASS: ${DB_PASS:?}
      ARI_USER: ${ARI_USER:-pbxng}
      ARI_PASS: ${ARI_PASS:?set ARI_PASS in .env}
      AMI_USER: ${AMI_USER:-pbxng-ami}
      AMI_PASS: ${AMI_PASS:?set AMI_PASS in .env}
      API_URL: ${API_URL:-127.0.0.1:3000}
      DOMAIN: ${DOMAIN:-pbx.local}
    volumes:
      - asterisk_sounds:/var/lib/asterisk/sounds/custom
      - recordings:/var/spool/asterisk/monitor
      - voicemail:/var/spool/asterisk/voicemail
      # Config que GENERA el panel (aparcado, captura, música en espera). Los .conf
      # horneados hacen #include de este directorio: así el panel cambia comportamiento
      # sin reconstruir la imagen.
      - asterisk_conf:/etc/asterisk/pbxng.d

  api:
    build: ../control-plane
    image: pbxng/api
    profiles: ["core"]
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PORT: 3000
      CONF_DIR: /etc/pbxng
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pbxng}
      DB_USER: ${DB_USER:-pbxng}
      DB_PASS: ${DB_PASS:?}
      ARI_URL: http://${ASTERISK_HOST:-127.0.0.1}:8088
      ARI_USER: ${ARI_USER:-pbxng}
      ARI_PASS: ${ARI_PASS:?}
      AMI_HOST: ${ASTERISK_HOST:-127.0.0.1}
      AMI_PORT: 5038
      AMI_USER: ${AMI_USER:-pbxng-ami}
      AMI_PASS: ${AMI_PASS:?}
      # Dónde vive el agente del núcleo (:8092): placas de red, rutas y diagnóstico.
      # Sin esta variable la API arma "http://:8092" y NADA del agente funciona
      # (no se ven las interfaces ni se puede cambiar el modo de red).
      ASTERISK_HOST: ${ASTERISK_HOST:-127.0.0.1}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      TENANT_MODE: ${TENANT_MODE:-single}
      DOMAIN: ${DOMAIN:-}
      PUBLIC_IP: ${PUBLIC_IP:-}
      TURN_USER: ${TURN_USER:-pbxng}
      TURN_PASS: ${TURN_PASS:-}
      DEFAULT_COMPANY: ${DEFAULT_COMPANY:-Mi Empresa}
      # --- topologia de nodos (parametriza IPs mostradas/usadas; sin lab viejo) ---
      SBC_HOST: ${SBC_HOST:-}
      NPM_HOST: ${NPM_HOST:-}
      TURN_HOST: ${TURN_HOST:-${PUBLIC_IP:-}}
      VOZ_HOST: ${VOZ_HOST:-}
      MEDIA_HOST: ${MEDIA_HOST:-${ASTERISK_HOST:-}}
      AST_AGENT: ${AST_AGENT:-}
      TURN_AGENT: ${TURN_AGENT:-}
      VM_AGENT: ${VM_AGENT:-}
    volumes:
      - recordings:/recordings
      - voicemail:/voicemail
      - certs:/etc/pbxng
      # El panel escribe acá la config de aparcado/captura/MoH que Asterisk incluye,
      # y deja los audios de música en espera junto a los sonidos personalizados.
      - asterisk_conf:/etc/asterisk/pbxng.d
      - asterisk_sounds:/var/lib/asterisk/sounds/custom
      - respaldos:/respaldos
    ports: ["3000:3000"]
    networks: [pbxng]

  dashboard:
    build: ../dashboard
    image: pbxng/dashboard
    profiles: ["core"]
    restart: unless-stopped
    depends_on: [api]
    environment:
      API_URL: http://api:3000
    ports: ["3001:3001"]
    networks: [pbxng]

  kamailio:
    build:
      context: .
      dockerfile: images/kamailio/Dockerfile
    image: pbxng/kamailio:5.6
    profiles: ["sbc"]
    restart: unless-stopped
    network_mode: host
    environment:
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-pbxng}
      DB_USER: ${DB_USER:-pbxng}
      DB_PASS: ${DB_PASS:?}
      ASTERISK_HOST: ${ASTERISK_HOST:-127.0.0.1}
      PUBLIC_IP: ${PUBLIC_IP:-}
      TRUSTED_NET: ${TRUSTED_NET:-}

  rtpengine:
    image: drachtio/rtpengine:latest
    profiles: ["sbc"]
    restart: unless-stopped
    network_mode: host
    environment:
      PUBLIC_IP: ${PUBLIC_IP:-pbx01.infratec.com.uy}
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        PUB=$$(getent hosts "$$PUBLIC_IP" | awk '{print $$1}'); [ -z "$$PUB" ] && PUB="$$PUBLIC_IP"
        LAN=$$(ip -4 route get 1.1.1.1 2>/dev/null | awk '{print $$7; exit}'); [ -z "$$LAN" ] && LAN=$$(hostname -I | awk '{print $$1}')
        echo "rtpengine: bind $$LAN advertise $$PUB"
        exec rtpengine --foreground --interface "$$LAN!$$PUB" --listen-ng 127.0.0.1:2223 --port-min 30000 --port-max 40000

  wsbridge:
    build:
      context: images/wsbridge
      dockerfile: Dockerfile
    image: pbxng/wsbridge
    profiles: ["sbc"]
    restart: unless-stopped
    network_mode: host
    environment:
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-pbxng}
      DB_USER: ${DB_USER:-pbxng}
      DB_PASS: ${DB_PASS:?}
      ASTERISK_HOST: ${ASTERISK_HOST:-192.168.99.10}
      KAM_HOST: ${KAM_HOST:-127.0.0.1}
      KAM_PORT: ${KAM_PORT:-5060}

  coturn:
    build:
      context: .
      dockerfile: images/coturn/Dockerfile
    image: pbxng/coturn
    profiles: ["media"]
    restart: unless-stopped
    network_mode: host
    environment:
      DOMAIN: ${DOMAIN:-pbx.local}
      TURN_REALM: ${TURN_REALM:-${DOMAIN:-pbx.local}}
      TURN_USER: ${TURN_USER:-pbxng}
      TURN_PASS: ${TURN_PASS:-pbxng-turn-changeme}
      TURN_CLI_PASS: ${TURN_CLI_PASS:-pbxng-cli}
      PUBLIC_IP: ${PUBLIC_IP:-}

  voz:
    build:
      context: ../voice-service
      dockerfile: ../docker/images/voz/Dockerfile
    image: pbxng/voz
    profiles: ["ai"]
    restart: unless-stopped
    volumes: [voz_models:/opt/voz/models]
    ports: ["8080:8080"]
    networks: [pbxng]

  npm:
    image: jc21/nginx-proxy-manager:latest
    profiles: ["proxy"]
    restart: unless-stopped
    ports: ["80:80", "443:443", "81:81"]
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks: [pbxng]
