<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" width="980" height="600" font-family="Segoe UI,Inter,Arial,sans-serif">
<title>El recorrido de puesta en marcha en cuatro fases</title>
<defs><filter id="sh" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".10"/></filter>
<marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#cbd5e1"/></marker>
<style>.t{font-size:16px;font-weight:800;fill:#0f172a}.s{font-size:11.5px;fill:#475569}.n{font-size:10px;font-weight:800;letter-spacing:1.2px}.h{font-size:11px;font-weight:800;letter-spacing:1.3px;fill:#94a3b8}.f{font-size:11px;fill:#94a3b8}</style></defs>
<rect width="980" height="600" fill="#f6f8fb"/>
<text x="40" y="46" class="h">EL RECORRIDO</text>
<text x="40" y="76" font-size="24" font-weight="800" fill="#0f172a">Cuatro fases, en este orden</text>
<text x="40" y="100" class="s">Cada fase se apoya en la anterior. Si respetás el orden, nunca tenés que volver atrás a rehacer algo.</text>
<line x1="40" y1="152" x2="940" y2="152" stroke="#e2e8f0" stroke-width="2" marker-end="url(#ar)"/>
<circle cx="148" cy="152" r="9" fill="#2f80ff"/><circle cx="148" cy="152" r="15" fill="#2f80ff" opacity=".18"/>
<g filter="url(#sh)"><rect x="40" y="168" width="215" height="300" rx="13" fill="#eff6ff" stroke="#bfdbfe"/></g>
<text x="58" y="196" class="n" fill="#2f80ff">FASE 1</text>
<text x="58" y="221" class="t">Cimientos</text>
<circle cx="64" cy="246" r="7" fill="#fff" stroke="#2f80ff" stroke-width="1.6"/>
<text x="64" y="249" text-anchor="middle" font-size="8.5" font-weight="800" fill="#2f80ff">1</text>
<text x="80" y="250" class="s">Entrar al panel y cambiar la clave</text>
<circle cx="64" cy="272" r="7" fill="#fff" stroke="#2f80ff" stroke-width="1.6"/>
<text x="64" y="275" text-anchor="middle" font-size="8.5" font-weight="800" fill="#2f80ff">2</text>
<text x="80" y="276" class="s">Elegir los módulos activos</text>
<circle cx="64" cy="298" r="7" fill="#fff" stroke="#2f80ff" stroke-width="1.6"/>
<text x="64" y="301" text-anchor="middle" font-size="8.5" font-weight="800" fill="#2f80ff">3</text>
<text x="80" y="302" class="s">Dominio y certificado (TLS)</text>
<circle cx="64" cy="324" r="7" fill="#fff" stroke="#2f80ff" stroke-width="1.6"/>
<text x="64" y="327" text-anchor="middle" font-size="8.5" font-weight="800" fill="#2f80ff">4</text>
<text x="80" y="328" class="s">Componentes: dónde vive cada pieza</text>
<circle cx="64" cy="350" r="7" fill="#fff" stroke="#2f80ff" stroke-width="1.6"/>
<text x="64" y="353" text-anchor="middle" font-size="8.5" font-weight="800" fill="#2f80ff">5</text>
<text x="80" y="354" class="s">Marca de la empresa</text>
<text x="58" y="418" class="f">Todavía no suena ningún teléfono.</text>
<text x="58" y="433" class="f">Estás dejando el terreno firme.</text>
<circle cx="376" cy="152" r="9" fill="#e05252"/><circle cx="376" cy="152" r="15" fill="#e05252" opacity=".18"/>
<g filter="url(#sh)"><rect x="268" y="168" width="215" height="300" rx="13" fill="#fef2f2" stroke="#fecaca"/></g>
<text x="286" y="196" class="n" fill="#e05252">FASE 2</text>
<text x="286" y="221" class="t">El borde y la línea</text>
<circle cx="292" cy="246" r="7" fill="#fff" stroke="#e05252" stroke-width="1.6"/>
<text x="292" y="249" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e05252">1</text>
<text x="308" y="250" class="s">SBC: seguridad y anti-fraude</text>
<circle cx="292" cy="272" r="7" fill="#fff" stroke="#e05252" stroke-width="1.6"/>
<text x="292" y="275" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e05252">2</text>
<text x="308" y="276" class="s">TURN: NAT para WebRTC</text>
<circle cx="292" cy="298" r="7" fill="#fff" stroke="#e05252" stroke-width="1.6"/>
<text x="292" y="301" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e05252">3</text>
<text x="308" y="302" class="s">Troncal con el operador</text>
<circle cx="292" cy="324" r="7" fill="#fff" stroke="#e05252" stroke-width="1.6"/>
<text x="292" y="327" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e05252">4</text>
<text x="308" y="328" class="s">Rutas salientes: qué se marca</text>
<circle cx="292" cy="350" r="7" fill="#fff" stroke="#e05252" stroke-width="1.6"/>
<text x="292" y="353" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e05252">5</text>
<text x="308" y="354" class="s">Rutas entrantes: quién atiende</text>
<text x="286" y="418" class="f">Acá la central empieza a hablar</text>
<text x="286" y="433" class="f">con el mundo. Probá una llamada.</text>
<circle cx="604" cy="152" r="9" fill="#7c3aed"/><circle cx="604" cy="152" r="15" fill="#7c3aed" opacity=".18"/>
<g filter="url(#sh)"><rect x="496" y="168" width="215" height="300" rx="13" fill="#faf5ff" stroke="#e9d5ff"/></g>
<text x="514" y="196" class="n" fill="#7c3aed">FASE 3</text>
<text x="514" y="221" class="t">Las personas</text>
<circle cx="520" cy="246" r="7" fill="#fff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="520" y="249" text-anchor="middle" font-size="8.5" font-weight="800" fill="#7c3aed">1</text>
<text x="536" y="250" class="s">Internos (WebRTC o SIP)</text>
<circle cx="520" cy="272" r="7" fill="#fff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="520" y="275" text-anchor="middle" font-size="8.5" font-weight="800" fill="#7c3aed">2</text>
<text x="536" y="276" class="s">Correo saliente</text>
<circle cx="520" cy="298" r="7" fill="#fff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="520" y="301" text-anchor="middle" font-size="8.5" font-weight="800" fill="#7c3aed">3</text>
<text x="536" y="302" class="s">Entrega: QR y enlace de acceso</text>
<circle cx="520" cy="324" r="7" fill="#fff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="520" y="327" text-anchor="middle" font-size="8.5" font-weight="800" fill="#7c3aed">4</text>
<text x="536" y="328" class="s">Teléfonos físicos por MAC</text>
<circle cx="520" cy="350" r="7" fill="#fff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="520" y="353" text-anchor="middle" font-size="8.5" font-weight="800" fill="#7c3aed">5</text>
<text x="536" y="354" class="s">Usuarios y roles del panel</text>
<text x="514" y="418" class="f">Cada persona ya puede llamar</text>
<text x="514" y="433" class="f">y la atienden.</text>
<circle cx="832" cy="152" r="9" fill="#059669"/><circle cx="832" cy="152" r="15" fill="#059669" opacity=".18"/>
<g filter="url(#sh)"><rect x="724" y="168" width="215" height="300" rx="13" fill="#ecfdf5" stroke="#a7f3d0"/></g>
<text x="742" y="196" class="n" fill="#059669">FASE 4</text>
<text x="742" y="221" class="t">Operación</text>
<circle cx="748" cy="246" r="7" fill="#fff" stroke="#059669" stroke-width="1.6"/>
<text x="748" y="249" text-anchor="middle" font-size="8.5" font-weight="800" fill="#059669">1</text>
<text x="764" y="250" class="s">Colas, IVR y buzones</text>
<circle cx="748" cy="272" r="7" fill="#fff" stroke="#059669" stroke-width="1.6"/>
<text x="748" y="275" text-anchor="middle" font-size="8.5" font-weight="800" fill="#059669">2</text>
<text x="764" y="276" class="s">Grabaciones y almacenamiento</text>
<circle cx="748" cy="298" r="7" fill="#fff" stroke="#059669" stroke-width="1.6"/>
<text x="748" y="301" text-anchor="middle" font-size="8.5" font-weight="800" fill="#059669">3</text>
<text x="764" y="302" class="s">Alertas por correo</text>
<circle cx="748" cy="324" r="7" fill="#fff" stroke="#059669" stroke-width="1.6"/>
<text x="748" y="327" text-anchor="middle" font-size="8.5" font-weight="800" fill="#059669">4</text>
<text x="764" y="328" class="s">CRM e Intercom</text>
<circle cx="748" cy="350" r="7" fill="#fff" stroke="#059669" stroke-width="1.6"/>
<text x="748" y="353" text-anchor="middle" font-size="8.5" font-weight="800" fill="#059669">5</text>
<text x="764" y="354" class="s">Wallboard e informes</text>
<text x="742" y="418" class="f">La central deja de ser un conmutador</text>
<text x="742" y="433" class="f">y pasa a ser una herramienta.</text>
<text x="40" y="580" class="f">Al final de la fase 4 tenés una central que se defiende sola, avisa cuando algo pasa y se puede medir.</text>
</svg>