<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="Segoe UI,Inter,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/></marker>
    <style>
      .t{font-size:13px;font-weight:700;fill:#0f172a}.s{font-size:11px;fill:#64748b}
      .mod{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase}
      .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="900" height="520" fill="#f8fafc"/>

  <!-- internet -->
  <rect x="360" y="16" width="180" height="42" rx="10" fill="#0f1a30"/>
  <text x="450" y="42" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Internet</text>

  <!-- zona borde -->
  <rect x="40" y="86" width="820" height="132" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="58" y="108" class="mod" fill="#94a3b8">Borde · expuesto a Internet</text>

  <rect x="62" y="120" width="180" height="80" rx="11" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="152" y="146" text-anchor="middle" class="t">Reverse proxy</text>
  <text x="152" y="164" text-anchor="middle" class="s">TLS · panel · WSS</text>
  <text x="152" y="184" text-anchor="middle" class="mod" fill="#2563eb">módulo proxy</text>

  <rect x="262" y="120" width="200" height="80" rx="11" fill="#fef2f2" stroke="#fecaca"/>
  <text x="362" y="146" text-anchor="middle" class="t">SBC (Kamailio + rtpengine)</text>
  <text x="362" y="164" text-anchor="middle" class="s">seguridad SIP · troncales · medios</text>
  <text x="362" y="184" text-anchor="middle" class="mod" fill="#dc2626">módulo sbc</text>

  <rect x="482" y="120" width="170" height="80" rx="11" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="567" y="146" text-anchor="middle" class="t">TURN (coturn)</text>
  <text x="567" y="164" text-anchor="middle" class="s">NAT para WebRTC</text>
  <text x="567" y="184" text-anchor="middle" class="mod" fill="#0d9488">módulo turn</text>

  <rect x="672" y="120" width="166" height="80" rx="11" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="755" y="146" text-anchor="middle" class="t">go2rtc</text>
  <text x="755" y="164" text-anchor="middle" class="s">video de porteros</text>
  <text x="755" y="184" text-anchor="middle" class="mod" fill="#ea580c">módulo intercom</text>

  <!-- zona nucleo -->
  <rect x="40" y="248" width="820" height="150" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="58" y="270" class="mod" fill="#94a3b8">Núcleo · nunca se publica a Internet</text>

  <rect x="62" y="284" width="190" height="94" rx="11" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="157" y="312" text-anchor="middle" class="t">Asterisk 22</text>
  <text x="157" y="330" text-anchor="middle" class="s">llamadas · dialplan</text>
  <text x="157" y="346" text-anchor="middle" class="s">buzón · grabación</text>
  <text x="157" y="366" text-anchor="middle" class="mod" fill="#7c3aed">módulo core</text>

  <rect x="272" y="284" width="190" height="94" rx="11" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="367" y="312" text-anchor="middle" class="t">API (control-plane)</text>
  <text x="367" y="330" text-anchor="middle" class="s">ARI · AMI · alertas</text>
  <text x="367" y="346" text-anchor="middle" class="s">correo · CRM</text>
  <text x="367" y="366" text-anchor="middle" class="mod" fill="#7c3aed">módulo core</text>

  <rect x="482" y="284" width="170" height="94" rx="11" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="567" y="312" text-anchor="middle" class="t">Panel web</text>
  <text x="567" y="330" text-anchor="middle" class="s">administración</text>
  <text x="567" y="346" text-anchor="middle" class="s">agente · supervisor</text>
  <text x="567" y="366" text-anchor="middle" class="mod" fill="#7c3aed">módulo core</text>

  <rect x="672" y="284" width="166" height="94" rx="11" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="755" y="312" text-anchor="middle" class="t">PostgreSQL</text>
  <text x="755" y="330" text-anchor="middle" class="s">config · CDR</text>
  <text x="755" y="346" text-anchor="middle" class="s">grabaciones · CRM</text>
  <text x="755" y="366" text-anchor="middle" class="mod" fill="#64748b">módulo core</text>

  <!-- IA -->
  <rect x="272" y="428" width="356" height="66" rx="11" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="450" y="454" text-anchor="middle" class="t">Motor de voz · TTS y transcripción (Whisper)</text>
  <text x="450" y="478" text-anchor="middle" class="mod" fill="#059669">módulo ai · opcional</text>

  <!-- flechas -->
  <path class="ln" d="M430,60 L160,116"/>
  <path class="ln" d="M450,60 L362,116"/>
  <path class="ln" d="M470,60 L560,116"/>
  <path class="ln" d="M362,204 L200,280"/>
  <path class="ln" d="M152,204 L360,280"/>
  <path class="ln" d="M567,204 L567,280"/>
  <path class="ln" d="M367,382 L400,424"/>
  <path class="ln" d="M660,332 L668,332"/>
  <path class="ln" d="M462,330 L478,330"/>
</svg>
