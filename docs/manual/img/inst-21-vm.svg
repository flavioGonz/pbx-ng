<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
<rect width="760" height="430" fill="#ffffff"/>
<text x="24" y="30" font-size="17" font-weight="800" fill="#0f172a">Instalación en máquina virtual (Proxmox / KVM)</text>
<text x="24" y="49" font-size="11.5" fill="#64748b">La opción recomendada: aislada, predecible y fácil de respaldar.</text>
<line x1="24" y1="60" x2="736" y2="60" stroke="#e2e8f0" stroke-width="1.5"/>
<rect x="24" y="76" width="712" height="40" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.8"/><text x="38" y="94.0" font-size="13" font-weight="700" fill="#0f172a">Servidor físico</text><text x="38" y="111.0" font-size="10.5" fill="#475569">compartido con otras máquinas virtuales</text><rect x="24" y="124" width="712" height="40" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/><text x="38" y="142.0" font-size="13" font-weight="700" fill="#0f172a">Hipervisor (Proxmox VE / KVM)</text><text x="38" y="159.0" font-size="10.5" fill="#475569">reparte CPU, RAM y red entre las VMs</text><rect x="24" y="172" width="712" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/><text x="38" y="192.0" font-size="13" font-weight="700" fill="#0f172a">VM dedicada a PBX-NG</text><text x="38" y="209.0" font-size="10.5" fill="#475569">CPU tipo «host» · CPU reservada (sin sobreventa)</text><rect x="24" y="224" width="712" height="36" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.8"/><text x="38" y="240.0" font-size="13" font-weight="700" fill="#0f172a">Docker + docker compose</text><text x="24" y="284" font-size="11" font-weight="700" fill="#166534">MÓDULOS DE PBX-NG</text><rect x="24" y="292" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="40.8" y="307" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">core</text><rect x="64.6" y="292" width="27.200000000000003" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="78.19999999999999" y="307" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">sbc</text><rect x="98.8" y="292" width="33.6" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="115.6" y="307" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">turn</text><rect x="139.4" y="292" width="20.8" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="149.8" y="307" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">ai</text><rect x="167.20000000000002" y="292" width="59.2" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><text x="196.8" y="307" font-size="10.5" font-weight="600" text-anchor="middle" fill="#0f172a">intercom</text>
<rect x="24" y="328" width="712" height="73" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/><text x="38" y="346" font-size="11" font-weight="800" fill="#92400e">AL INSTALAR, TENER EN CUENTA</text><text x="38" y="365" font-size="11" fill="#78350f">• Es la opción RECOMENDADA para la mayoría: buen aislamiento y comportamiento predecible.</text><text x="38" y="382" font-size="11" fill="#78350f">• Poné el tipo de procesador en «host» para que la VM use el cifrado por hardware (AES-NI).</text><text x="38" y="399" font-size="11" fill="#78350f">• No sobrevendas CPU: si el hipervisor se queda sin núcleos reales, el audio se corta.</text>
</svg>
