<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" width="980" height="470" font-family="Segoe UI,Inter,Arial,sans-serif">
<title>Con dominio y certificado vs sin dominio</title>
<defs><filter id="sh" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".10"/></filter>
<style>.t{font-size:16px;font-weight:800;fill:#0f172a}.s{font-size:12px;fill:#475569}.h{font-size:11px;font-weight:800;letter-spacing:1.3px;fill:#94a3b8}.ok{font-size:12px;fill:#065f46}.no{font-size:12px;fill:#991b1b}</style></defs>
<rect width="980" height="470" fill="#f6f8fb"/>
<text x="40" y="42" class="h">POR QUÉ EL CERTIFICADO NO ES OPCIONAL</text>
<text x="40" y="72" font-size="23" font-weight="800" fill="#0f172a">El navegador no da micrófono fuera de un origen seguro</text>
<text x="40" y="96" class="s">No es una decisión de PBX-NG: es una regla de los navegadores. Sin HTTPS válido no hay getUserMedia ni WebSocket seguro (wss://).</text>
<g filter="url(#sh)"><rect x="40" y="124" width="440" height="308" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/></g>
<g transform="translate(64,146)" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="10" width="18" height="12" rx="2.5"/><path d="M6 10V7a5 5 0 0 1 10 0v3"/></g>
<text x="96" y="164" class="t">Con dominio + certificado</text>
<text x="96" y="184" class="s">https://pbx.tuempresa.com · wss:// habilitado</text>
<circle cx="72" cy="210" r="8" fill="#059669" opacity=".14"/>
<path d="M68 210 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="214" class="ok">Softphone en el navegador</text>
<circle cx="72" cy="236" r="8" fill="#059669" opacity=".14"/>
<path d="M68 236 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="240" class="ok">Softphone en el celular (PWA)</text>
<circle cx="72" cy="262" r="8" fill="#059669" opacity=".14"/>
<path d="M68 262 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="266" class="ok">App de escritorio en modo WebRTC</text>
<circle cx="72" cy="288" r="8" fill="#059669" opacity=".14"/>
<path d="M68 288 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="292" class="ok">Teletrabajo sin VPN</text>
<circle cx="72" cy="314" r="8" fill="#059669" opacity=".14"/>
<path d="M68 314 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="318" class="ok">QR y enlace de acceso</text>
<circle cx="72" cy="340" r="8" fill="#059669" opacity=".14"/>
<path d="M68 340 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="344" class="ok">Click-to-Call desde la web</text>
<circle cx="72" cy="366" r="8" fill="#059669" opacity=".14"/>
<path d="M68 366 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="370" class="ok">Teléfonos SIP en la LAN</text>
<circle cx="72" cy="392" r="8" fill="#059669" opacity=".14"/>
<path d="M68 392 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="90" y="396" class="ok">Troncales SIP con el operador</text>
<g filter="url(#sh)"><rect x="500" y="124" width="440" height="308" rx="14" fill="#fef2f2" stroke="#fecaca"/></g>
<g transform="translate(524,146)" stroke="#e05252" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="10" width="18" height="12" rx="2.5"/><path d="M6 10V8a5 5 0 0 1 7-4.6"/><path d="M8 15l6 4M14 15l-6 4"/></g>
<text x="556" y="164" class="t">Sin dominio (solo IP)</text>
<text x="556" y="184" class="s">http://192.168.x.x · origen inseguro</text>
<circle cx="532" cy="210" r="8" fill="#e05252" opacity=".14"/>
<path d="M529 207 l6 6 M535 207 l-6 6" stroke="#e05252" stroke-width="2" stroke-linecap="round"/>
<text x="550" y="214" class="no">Softphone en el navegador</text>
<circle cx="532" cy="236" r="8" fill="#e05252" opacity=".14"/>
<path d="M529 233 l6 6 M535 233 l-6 6" stroke="#e05252" stroke-width="2" stroke-linecap="round"/>
<text x="550" y="240" class="no">Softphone en el celular (PWA)</text>
<circle cx="532" cy="262" r="8" fill="#e05252" opacity=".14"/>
<path d="M529 259 l6 6 M535 259 l-6 6" stroke="#e05252" stroke-width="2" stroke-linecap="round"/>
<text x="550" y="266" class="no">App de escritorio en modo WebRTC</text>
<circle cx="532" cy="288" r="8" fill="#e05252" opacity=".14"/>
<path d="M529 285 l6 6 M535 285 l-6 6" stroke="#e05252" stroke-width="2" stroke-linecap="round"/>
<text x="550" y="292" class="no">Teletrabajo sin VPN</text>
<circle cx="532" cy="314" r="8" fill="#e05252" opacity=".14"/>
<path d="M529 311 l6 6 M535 311 l-6 6" stroke="#e05252" stroke-width="2" stroke-linecap="round"/>
<text x="550" y="318" class="no">QR y enlace de acceso</text>
<circle cx="532" cy="340" r="8" fill="#e05252" opacity=".14"/>
<path d="M529 337 l6 6 M535 337 l-6 6" stroke="#e05252" stroke-width="2" stroke-linecap="round"/>
<text x="550" y="344" class="no">Click-to-Call desde la web</text>
<circle cx="532" cy="366" r="8" fill="#059669" opacity=".14"/>
<path d="M528 366 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="550" y="370" class="ok">Teléfonos SIP en la LAN</text>
<circle cx="532" cy="392" r="8" fill="#059669" opacity=".14"/>
<path d="M528 392 l3 3 5-6" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="550" y="396" class="ok">Troncales SIP con el operador</text>
<text x="40" y="458" class="s" fill="#94a3b8">Un certificado autofirmado tampoco alcanza: el navegador lo rechaza igual. El orden correcto es dominio → certificado → todo lo demás.</text>
</svg>